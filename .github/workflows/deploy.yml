name: Deploy to GCE

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/Zoiko-Loop
            git pull origin main
            npm install
            npm run build
            sudo rm -rf /var/www/zoiko-loop/*
            sudo cp -r out/* /var/www/zoiko-loop/
            sudo chown -R www-data:www-data /var/www/zoiko-loop
            sudo systemctl reload nginx
